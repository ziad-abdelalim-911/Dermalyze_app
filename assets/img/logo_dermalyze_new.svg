<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="gFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#62C8D8"/>
      <stop offset="100%" stop-color="#4A8FD4"/>
    </linearGradient>
    <linearGradient id="gMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3AADBE"/>
      <stop offset="100%" stop-color="#2F6DB5"/>
    </linearGradient>
    <linearGradient id="gBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E7A8A"/>
      <stop offset="100%" stop-color="#1A4D8A"/>
    </linearGradient>
    <linearGradient id="gDeep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#145E6E"/>
      <stop offset="100%" stop-color="#103870"/>
    </linearGradient>
    <clipPath id="appClip">
      <rect width="500" height="500" rx="88" ry="88"/>
    </clipPath>
  </defs>

  <rect width="500" height="500" rx="88" ry="88" fill="#0E1C2F"/>

  <g clip-path="url(#appClip)">
    <!-- Layer 4 deepest back -->
    <g transform="rotate(-7,250,250) translate(-12,-10)" opacity="0.45">
      <path d="M148,108 L148,392 M148,108 L202,108 C338,108 370,172 370,250 C370,328 338,392 202,392 L148,392"
        fill="none" stroke="url(#gDeep)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Layer 3 -->
    <g transform="rotate(-4.5,250,250) translate(-6,-5)" opacity="0.62">
      <path d="M148,108 L148,392 M148,108 L202,108 C338,108 370,172 370,250 C370,328 338,392 202,392 L148,392"
        fill="none" stroke="url(#gBack)" stroke-width="21" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Layer 2 -->
    <g transform="rotate(-2,250,250) translate(-2,-2)" opacity="0.80">
      <path d="M148,108 L148,392 M148,108 L202,108 C338,108 370,172 370,250 C370,328 338,392 202,392 L148,392"
        fill="none" stroke="url(#gMid)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Layer 1 front -->
    <path d="M148,108 L148,392 M148,108 L202,108 C338,108 370,172 370,250 C370,328 338,392 202,392 L148,392"
      fill="none" stroke="url(#gFront)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
