name: dermalyze
description: "Dermalyze app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  google_fonts: ^6.1.0
  gap: ^3.0.1
  loading_animation_widget: ^1.3.0
  flutter_spinkit: ^5.2.2
  smooth_page_indicator: ^2.0.1
  flutter_native_splash: ^2.4.7
  get: ^4.7.3
  dots_indicator: ^4.0.1
  device_preview: ^1.3.1
  chat_bubbles: ^1.8.0
  image_picker: ^1.0.7
  record: ^6.2.0
  path_provider: ^2.1.2
  audioplayers: ^5.2.1
  shared_preferences: ^2.5.4
  flutter_bloc: ^9.1.1
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons:  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/ic_launcher_foreground.png"
  adaptive_icon_path: "assets/icons/ic_launcher_foreground.png"
  image_path_android: "assets/icons/play_store_512.png"
  image_path_ios: "assets/icons/play_store_512.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/ic_launcher_foreground.png"
  adaptive_icon_padding: true
flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/img/

  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/Fonts/Inter/Inter-Italic-VariableFont_opsz,wght.ttf
        - asset: assets/Fonts/Inter/Inter-VariableFont_opsz,wght.ttf
          style: italic
  
